name: diary_client
description: "An offline-first diary application."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Local database
  drift: ^2.22.1
  drift_flutter: ^0.2.4
  sqlite3_flutter_libs: ^0.5.28
  path_provider: ^2.1.4
  path: ^1.9.1

  # Network
  dio: ^5.7.0
  connectivity_plus: ^6.1.1

  # Storage
  shared_preferences: ^2.3.3

  # Routing
  go_router: ^14.6.3

  # Serialization
  json_annotation: ^4.9.0
  freezed_annotation: ^2.4.4

  # Image
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1

  # Utils
  intl: ^0.20.2
  uuid: ^4.5.1
  url_launcher: ^6.3.1
  share_plus: ^12.0.2
  flutter_svg: ^2.0.17
  cupertino_icons: ^1.0.8
  flutter_quill: ^11.5.0
  dart_quill_delta: ^10.8.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  drift_dev: ^2.22.1
  riverpod_generator: ^2.6.1
  json_serializable: ^6.9.0
  freezed: ^2.5.7

flutter:
  uses-material-design: true
  assets:
    - assets/images/
