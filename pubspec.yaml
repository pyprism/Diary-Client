name: diary_client
description: "An offline-first diary application."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2

  # Local database
  drift: ^2.34.1
  drift_flutter: ^0.3.1
  sqlite3_flutter_libs: ^0.6.0+eol
  path_provider: ^2.1.6
  path: ^1.9.1

  # Network
  dio: ^5.10.0
  connectivity_plus: ^7.2.0

  # Storage
  shared_preferences: ^2.3.3

  # Routing
  go_router: ^17.3.0

  # Serialization
  json_annotation: ^4.12.0
  freezed_annotation: ^3.1.0

  # Image
  image_picker: ^1.2.3
  cached_network_image: ^3.4.1

  # Utils
  intl: ^0.20.2
  uuid: ^4.5.1
  url_launcher: ^6.3.1
  share_plus: ^13.2.1
  flutter_svg: ^2.3.0
  cupertino_icons: ^1.0.8
  flutter_quill: ^11.5.1
  dart_quill_delta: ^10.8.3
  flutter_launcher_icons: ^0.14.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.15.1
  drift_dev: ^2.33.0
  riverpod_generator: ^4.0.4-dev.1
  json_serializable: ^6.14.0
  freezed: ^3.2.6-dev.1

flutter:
  uses-material-design: true
